name: Editorial

on:
  workflow_run:
    workflows: ["Update Dataset"]
    types: [completed]
  workflow_dispatch:
    inputs:
      fake:
        description: "Use deterministic fake editor backend for workflow smoke testing."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: editorial
  cancel-in-progress: false

jobs:
  editorial:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run editorial queue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.siliconflow.cn/v1' }}
          EDITORIAL_ORCHESTRATOR_MODEL: ${{ vars.EDITORIAL_ORCHESTRATOR_MODEL || 'deepseek-ai/DeepSeek-V4-Pro' }}
          EDITORIAL_RESEARCH_MODEL: ${{ vars.EDITORIAL_RESEARCH_MODEL || 'deepseek-ai/DeepSeek-V4-Flash' }}
          EDITORIAL_SELECTION_MODEL: ${{ vars.EDITORIAL_SELECTION_MODEL || 'deepseek-ai/DeepSeek-V4-Pro' }}
          EDITORIAL_ZH_WRITER_MODEL: ${{ vars.EDITORIAL_ZH_WRITER_MODEL || 'zai-org/GLM-5.2' }}
          EDITORIAL_ZH_EDITOR_MODEL: ${{ vars.EDITORIAL_ZH_EDITOR_MODEL || 'Qwen/Qwen3.5-397B-A17B' }}
          EDITORIAL_EN_WRITER_MODEL: ${{ vars.EDITORIAL_EN_WRITER_MODEL || 'deepseek-ai/DeepSeek-V4-Flash' }}
          EDITORIAL_EN_EDITOR_MODEL: ${{ vars.EDITORIAL_EN_EDITOR_MODEL || 'deepseek-ai/DeepSeek-V4-Pro' }}
          EDITORIAL_FACT_CHECK_MODEL: ${{ vars.EDITORIAL_FACT_CHECK_MODEL || 'deepseek-ai/DeepSeek-V4-Pro' }}
          EDITORIAL_AGENT_TIMEOUT_SECONDS: ${{ vars.EDITORIAL_AGENT_TIMEOUT_SECONDS || '90' }}
          KEYPOOL_KEY: ${{ secrets.KEYPOOL_KEY }}
          KEYPOOL_URL: ${{ vars.KEYPOOL_URL || secrets.KEYPOOL_URL }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.fake }}" = "true" ]; then
            EXTRA_ARGS="--fake --no-research"
          fi
          python scripts/run_editorial_queue.py --json ${EXTRA_ARGS}

      - name: Upload editorial artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: editorial-run
          path: |
            manifests/editorial-queue.json
            manifests/editorial-run.json
            agent-runs/**
            reports/editorial/**
            site/editorial/**
          if-no-files-found: ignore

      - name: Run tests
        run: python -m pytest -q --ignore=tests/test_extract.py --ignore=tests/test_database.py

      - name: Commit editorial outputs when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/editorial site/editorial manifests/editorial-queue.json manifests/editorial-run.json site/index.html
          if [ -d agent-runs ]; then
            git add agent-runs
          fi
          if git diff --cached --quiet; then
            echo "No editorial changes to commit."
          else
            git commit -m "chore: publish editorial picks [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
