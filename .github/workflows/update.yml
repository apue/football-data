name: Update Dataset

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update.yml"
      - ".agents/**"
      - "AGENTS.md"
      - "README.md"
      - "config/**"
      - "pyproject.toml"
      - "football_data/**"
      - "reports/**"
      - "scripts/**"
      - "site/**"
      - "examples/**"
      - "notebooks/**"
      - "tests/**"
  schedule:
    # GitHub cron schedules use UTC. This is 12:23 Asia/Shanghai.
    - cron: "23 4 * * *"
  workflow_dispatch:

concurrency:
  group: update-dataset
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Rebuild dataset and demo
        run: python scripts/update_dataset.py

      - name: Run tests
        run: python -m pytest -q

      - name: Show update status
        if: always()
        run: |
          test -f manifests/latest-run.json && cat manifests/latest-run.json || true

      - name: Upload update artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: update-status
          path: |
            manifests/latest-run.json
            manifests/sources.json
            manifests/discovered-sources.json
            manifests/update-events.json
            data/latest.sqlite
          if-no-files-found: ignore

      - name: Commit generated data when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.sqlite manifests/sources.json manifests/discovered-sources.json manifests/update-events.json manifests/latest-run.json site/index.html
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: update generated dataset"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
